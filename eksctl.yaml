

apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: roboshop-manju
  region: us-east-1

managedNodeGroups:
  - name: spot
    instanceTypes: ["c3.large", "c4.large", "c5.large", "c5a.large", "c5n.large", "c5d.large"] # Multiple types for better Spot availability
    spot: true
    desiredCapacity: 2