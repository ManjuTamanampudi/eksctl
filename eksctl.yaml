

apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: roboshop
  region: us-east-1

managedNodeGroups:
  - name: spot
    # instanceTypes: ["t2.micro","t3.micro", "t3.small"]
    instanceTypes: ["c3.large","c4.large","c5.large","c5d.large","c5n.large","c5a.large"] # Multiple types for better Spot availability
    spot: true
    desiredCapacity: 2